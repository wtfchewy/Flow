<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peak — A native note-taking app for macOS</title>
    <meta name="description" content="Peak is a beautiful, native note-taking app for macOS with iCloud sync, markdown support, and a distraction-free writing experience." />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Kalam:wght@400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var d = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
