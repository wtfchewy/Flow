name: "Build macOS"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-macos:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-darwin,x86_64-apple-darwin"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Verify certificate
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
          echo "Certificate imported successfully."

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Peak v__VERSION__"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload updater signature and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Search for the .sig file anywhere under the target directory
          echo "Searching for .sig file..."
          find "$GITHUB_WORKSPACE/src-tauri/target" -name "*.app.tar.gz.sig" -type f 2>/dev/null || true
          SIG_FILE=$(find "$GITHUB_WORKSPACE/src-tauri/target" -name "*.app.tar.gz.sig" -type f 2>/dev/null | head -1)

          if [ -z "$SIG_FILE" ]; then
            echo "No .sig file found, skipping updater manifest"
            exit 0
          fi

          echo "Found sig file: $SIG_FILE"
          SIGNATURE=$(cat "$SIG_FILE")
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          TAG="v$VERSION"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAR_URL="https://github.com/wtfchewy/Peak/releases/download/$TAG/Peak_universal.app.tar.gz"

          # Upload the .sig file to the release
          gh release upload "$TAG" "$SIG_FILE#Peak_universal.app.tar.gz.sig" --repo wtfchewy/Peak --clobber

          # Generate and upload latest.json
          cat > latest.json << 'ENDJSON'
          {
            "version": "PLACEHOLDER_VERSION",
            "notes": "PLACEHOLDER_NOTES",
            "pub_date": "PLACEHOLDER_DATE",
            "platforms": {
              "darwin-universal": {
                "signature": "PLACEHOLDER_SIG",
                "url": "PLACEHOLDER_URL"
              },
              "darwin-aarch64": {
                "signature": "PLACEHOLDER_SIG",
                "url": "PLACEHOLDER_URL"
              },
              "darwin-x86_64": {
                "signature": "PLACEHOLDER_SIG",
                "url": "PLACEHOLDER_URL"
              }
            }
          }
          ENDJSON

          # Replace placeholders (avoids heredoc variable expansion issues)
          sed -i '' "s|PLACEHOLDER_VERSION|$VERSION|g" latest.json
          sed -i '' "s|PLACEHOLDER_NOTES|Peak v$VERSION|g" latest.json
          sed -i '' "s|PLACEHOLDER_DATE|$PUB_DATE|g" latest.json
          sed -i '' "s|PLACEHOLDER_SIG|$SIGNATURE|g" latest.json
          sed -i '' "s|PLACEHOLDER_URL|$TAR_URL|g" latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json --repo wtfchewy/Peak --clobber
